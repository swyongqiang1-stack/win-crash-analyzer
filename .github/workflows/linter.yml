name: Lint PowerShell Code

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

permissions:
  contents: read

jobs:
  lint:
    name: Run PSScriptAnalyzer
    runs-on: windows-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Execute Static Code Analysis
        shell: pwsh
        run: |
          # 1. Ensure the official PSScriptAnalyzer module is present
          $ModuleName = "PSScriptAnalyzer"
          if (-not (Get-Module -ListAvailable -Name $ModuleName)) {
              Write-Host "Installing PSScriptAnalyzer module..." -ForegroundColor Cyan
              Install-Module -Name $ModuleName -Force -AllowClobber -Scope CurrentUser
          }

          # 2. Dynamic Discovery of all PowerShell scripts to prevent missing path crashes
          Write-Host "Discovering target PowerShell scripts..." -ForegroundColor Cyan
          $AllScripts = Get-ChildItem -Path "." -Recurse -Include "*.ps1", "*.psm1" | Select-Object -ExpandProperty FullName

          if (-not $AllScripts) {
              Write-Host "ℹ️ No PowerShell script files found in this repository workspace. Skipping analysis." -ForegroundColor Yellow
              exit 0
          }

          # 3. Run analysis targeting explicitly discovered file paths
          Write-Host "Scanning discovered code patterns via PSScriptAnalyzer..." -ForegroundColor Cyan
          $Issues = Invoke-ScriptAnalyzer -Path $AllScripts -Severity @('Error', 'Warning')

          # 4. Process telemetry results
          if ($Issues) {
              $Issues | ForEach-Object {
                  $FormattedMessage = "[$($_.Severity)] $($_.Message) (Line: $($_.Line), Rule: $($_.RuleName), File: $($_.ScriptName))"
                  if ($_.Severity -eq 'Error') {
                      Write-Error $FormattedMessage
                  } else {
                      Write-Warning $FormattedMessage
                  }
              }
              
              # Break the pipeline build explicitly if structural Errors exist
              if ($Issues | Where-Object { $_.Severity -eq 'Error' }) {
                  Write-Host "##[error] Pipeline failed due to severe syntax or logical errors."
                  exit 1
              }
          } else {
              Write-Host "🎉 Automation Verified: Zero code style issues detected!" -ForegroundColor Green
          }
